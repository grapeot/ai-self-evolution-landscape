<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b6914" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b6914" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3d2b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5a3d2b" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a4a6b" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1a4a6b" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="420" fill="#fafaf8" rx="8"/>

  <!-- Layer 3 (Top): Thinking -->
  <polygon points="300,25 430,110 170,110" fill="url(#top)" stroke="#8b6914" stroke-width="1.5"/>
  <text x="300" y="60" text-anchor="middle" font-family="Georgia, Songti SC, serif" font-size="16" font-weight="600" fill="#8b6914">思维辅助</text>
  <text x="300" y="82" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#8b6914" opacity="0.7">框架 · 比喻 · 对比分析</text>
  <text x="300" y="98" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="10" fill="#5c5548" opacity="0.5">帮助形成自己的判断</text>

  <!-- Layer 2 (Middle): Intuition -->
  <polygon points="300,120 520,230 80,230" fill="url(#mid)" stroke="#5a3d2b" stroke-width="1.5"/>
  <text x="300" y="165" text-anchor="middle" font-family="Georgia, Songti SC, serif" font-size="16" font-weight="600" fill="#5a3d2b">直觉地图</text>
  <text x="300" y="187" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#5a3d2b" opacity="0.7">Region · Intuition · Tension</text>
  <text x="300" y="203" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="10" fill="#5c5548" opacity="0.5">低认知负担 · 30 秒建立 mental model</text>
  <text x="300" y="218" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="10" fill="#5c5548" opacity="0.5">事实/观点标注 · 来源可追溯</text>

  <!-- Layer 1 (Bottom): Library -->
  <polygon points="300,240 580,380 20,380" fill="url(#base)" stroke="#1a4a6b" stroke-width="1.5"/>
  <text x="300" y="300" text-anchor="middle" font-family="Georgia, Songti SC, serif" font-size="16" font-weight="600" fill="#1a4a6b">原文图书馆</text>
  <text x="300" y="322" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="11" fill="#1a4a6b" opacity="0.7">全部原始文章的中文翻译</text>
  <text x="300" y="338" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="10" fill="#5c5548" opacity="0.5">Seed 文章 + 追踪引用的一手资料</text>
  <text x="300" y="353" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="10" fill="#5c5548" opacity="0.5">每篇翻译附带原文链接</text>

  <!-- Arrow annotations -->
  <text x="310" y="115" font-family="system-ui, sans-serif" font-size="9" fill="#5c5548" opacity="0.4">↑ 提供判断依据</text>
  <text x="310" y="235" font-family="system-ui, sans-serif" font-size="9" fill="#5c5548" opacity="0.4">↑ 结构化为直觉</text>
</svg>
